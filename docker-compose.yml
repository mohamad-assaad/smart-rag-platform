services:
  postgres:
    image: postgres:16
    container_name: smart-rag-postgres
    environment:
      POSTGRES_DB: smart_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: smart-rag-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: smart-rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  api:
    build:
      context: ./backend
    container_name: smart-rag-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/smart_rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      DYNAMICS_TENANT_ID: ${DYNAMICS_TENANT_ID:-}
      DYNAMICS_CLIENT_ID: ${DYNAMICS_CLIENT_ID:-}
      DYNAMICS_CLIENT_SECRET: ${DYNAMICS_CLIENT_SECRET:-}
      DYNAMICS_RESOURCE_URL: ${DYNAMICS_RESOURCE_URL:-https://org62f5e36c.crm4.dynamics.com}
      DYNAMICS_API_VERSION: ${DYNAMICS_API_VERSION:-v9.2}
      DYNAMICS_CUSTOMER_TABLE: ${DYNAMICS_CUSTOMER_TABLE:-new_customerprofile}
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  qdrant_data: